---
- name: Install Red Hat Satellite
  hosts: satellite
  become: true
  gather_facts: true
  tasks:
    - name: Fail if invalid Satellite URL defined
      ansible.builtin.fail:
        msg: "Satellite URL must start with http:// or https://."
      when:
        - not satellite_server_url | default(true) or
          (not satellite_server_url.startswith("http://") and
           not satellite_server_url.startswith("https://"))

    - name: Install required packages
      ansible.builtin.dnf:
        name:
          - firewalld
          - podman
          - satellite
          - sos
        state: present

    - name: Enable firewalld service
      ansible.builtin.service:
        name: firewalld
        enabled: true

    - name: Start firewalld service
      ansible.builtin.service:
        name: firewalld
        state: started

    - name: Configure Satellite firewall
      ansible.posix.firewalld:
        service: RH-Satellite-6
        zone: "{{ satellite_firewall_zone }}"
        state: enabled
        immediate: true
        permanent: true

    - name: Check Satellite status
      redhat.satellite.status_info:
        server_url: "{{ satellite_server_url }}"
        username: "{{ satellite_username }}"
        password: "{{ satellite_password }}"
        validate_certs: false
      register: satellite_info
      failed_when:
        - satellite_info.msg is defined
        - "'Unauthorized' in satellite_info.msg"

    - name: Check Red Hat container registry login status
      ansible.builtin.command: >
        podman login --authfile /etc/foreman/registry-auth.json --get-login registry.redhat.io
      register: podman_login
      failed_when: false
      changed_when: false
      when:
        - "'--enable-iop' in satellite_installer_options"
        - (satellite_info.msg is defined and 'Connection refused' in satellite_info.msg) or
          (satellite_info.status.result is defined and satellite_info.status.result != 'ok')

    - name: Login to Red Hat container registry for Lightspeed installation
      no_log: true
      ansible.builtin.shell: >
        set -o pipefail &&
        echo '{{ satellite_rhsm_password }}' |
        podman login --authfile /etc/foreman/registry-auth.json
        --username {{ satellite_rhsm_username }} --password-stdin
        registry.redhat.io
      changed_when: true
      when:
        - podman_login is not skipped
        - "'not logged into' in podman_login.stderr"

    - name: Install Satellite
      ansible.builtin.include_role:
        name: redhat.satellite_operations.installer
      register: satellite_install
      when: >
        (satellite_info.msg is defined and 'Connection refused' in satellite_info.msg) or
        (satellite_info.status.result is defined and satellite_info.status.result != 'ok')

    - name: Run post-install health check
      ansible.builtin.command: satellite-maintain health check --plaintext
      changed_when: false
      when: satellite_install is changed
